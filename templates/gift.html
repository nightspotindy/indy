{% extends "base.html" %}
{% block body %}
{% if gift %}
<h1>{{ heading }}</h1>
<p>{{ kept }}</p>

<figure class="full">
  <img src="/photo?final=1" alt="you, on the spot"
       onerror="this.style.display='none'">
</figure>

{% if gift.kind == "voice" %}
<audio controls src="/voice/{{ gift.id }}"></audio>
{% else %}
<blockquote>{{ gift.body }}</blockquote>
{% endif %}

<form method="post" action="/carry">
  <button type="submit">Carry it</button>
</form>
{% else %}
<h1>Yours now.</h1>
<p>Nothing was set down. That happens.</p>
<form method="post" action="/carry">
  <button type="submit">Carry on</button>
</form>
{% endif %}
{% endblock %}
